{% extends "base.html" %}
{% block title %}历史浏览 - Trend Opportunity Radar{% endblock %}

{% block content %}
<h3 class="mb-4"><i class="bi bi-clock-history"></i> 历史关键词浏览</h3>

<div class="row g-3 mb-3">
    <div class="col-md-3">
        <select class="form-select" id="catFilter" onchange="loadHistory()">
            <option value="">全部分类</option>
            <option value="Business">商业</option>
            <option value="Technology">技术</option>
            <option value="Health">健康</option>
        </select>
    </div>
    <div class="col-md-3">
        <select class="form-select" id="statusFilter" onchange="loadHistory()">
            <option value="">全部状态</option>
            <option value="long_term">长期需求</option>
            <option value="event_driven">事件型</option>
            <option value="pending">待分析</option>
        </select>
    </div>
    <div class="col-md-4">
        <input class="form-control" id="searchInput" placeholder="搜索关键词..." onkeyup="if(event.key==='Enter') loadHistory()">
    </div>
    <div class="col-md-2">
        <button class="btn btn-primary w-100" onclick="loadHistory()"><i class="bi bi-search"></i> 搜索</button>
    </div>
</div>

<div class="table-responsive">
    <table class="table table-hover" id="historyTable">
        <thead class="table-light">
            <tr>
                <th>关键词</th>
                <th>分类</th>
                <th>状态</th>
                <th>首次</th>
                <th>最近</th>
                <th>峰值</th>
                <th>活跃天</th>
            </tr>
        </thead>
        <tbody id="historyBody"></tbody>
    </table>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadHistory() {
    const cat = document.getElementById('catFilter').value;
    const status = document.getElementById('statusFilter').value;
    const search = document.getElementById('searchInput').value.trim();
    let url = `/api/history?`;
    if (search) url += `search=${encodeURIComponent(search)}`;
    else if (status) url += `status=${status}&category=${cat}`;
    else url += `category=${cat}`;

    const res = await fetch(url);
    const data = await res.json();
    const tbody = document.getElementById('historyBody');
    tbody.innerHTML = '';
    if (!data.keywords || data.keywords.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">无匹配结果</td></tr>';
        return;
    }
    data.keywords.forEach(kw => {
        const days = kw.last_seen && kw.first_seen
            ? Math.max(1, Math.round((new Date(kw.last_seen) - new Date(kw.first_seen)) / 86400000))
            : '?';
        const statusMap = {'long_term': '长期需求', 'event_driven': '事件型', 'pending': '待分析'};
        const badgeMap = {'long_term': 'success', 'event_driven': 'warning', 'pending': 'secondary'};
        tbody.innerHTML += `<tr>
            <td><a href="/keyword/${kw.id}" class="text-decoration-none fw-medium">${kw.keyword}</a></td>
            <td><span class="badge bg-${kw.category_name === 'Technology' ? 'info' : kw.category_name === 'Health' ? 'success' : 'secondary'}">${kw.category_name}</span></td>
            <td><span class="badge bg-${badgeMap[kw.status] || 'secondary'}">${statusMap[kw.status] || kw.status}</span></td>
            <td><small>${kw.first_seen}</small></td>
            <td><small>${kw.last_seen}</small></td>
            <td>${kw.peak_score || 0}</td>
            <td>${days}天</td>
        </tr>`;
    });
}

loadHistory();
</script>
{% endblock %}
